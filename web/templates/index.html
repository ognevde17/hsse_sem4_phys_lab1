<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Электростатика — Метод моментов</title>
<style>
  /* ---- Reset & base ---- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #f1f5f9;
    --surface:  #ffffff;
    --border:   #e2e8f0;
    --primary:  #2563eb;
    --primary-h:#1d4ed8;
    --accent:   #0ea5e9;
    --text:     #0f172a;
    --muted:    #64748b;
    --success:  #10b981;
    --warn:     #f59e0b;
    --danger:   #ef4444;
    --radius:   10px;
    --shadow:   0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  }
  html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif;
               background: var(--bg); color: var(--text); font-size: 14px; }

  /* ---- Layout ---- */
  .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }

  header {
    background: var(--primary);
    display: flex; align-items: center; gap: 12px;
    padding: 0 24px;
    box-shadow: 0 2px 8px rgba(37,99,235,.4);
  }
  header h1 { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: .3px; }
  header .badge {
    background: rgba(255,255,255,.18); color: #fff;
    padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 500;
  }

  .main { display: grid; grid-template-columns: 300px 1fr; overflow: hidden; }

  /* ---- Sidebar ---- */
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px;
  }

  .geo-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
              background: var(--bg); border-radius: var(--radius); padding: 3px; }
  .geo-tab {
    padding: 8px; text-align: center; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s;
    border: none; background: transparent;
  }
  .geo-tab.active { background: var(--surface); color: var(--primary);
                    box-shadow: 0 1px 3px rgba(0,0,0,.12); }

  .section-title {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px;
  }

  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--muted); }
  .field-row { display: flex; align-items: center; gap: 8px; }
  .field-row input[type=range] { flex: 1; accent-color: var(--primary); }
  .field-row .num {
    width: 64px; padding: 5px 8px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; text-align: right; background: var(--bg);
    color: var(--text); outline: none; transition: border-color .15s;
  }
  .field-row .num:focus { border-color: var(--primary); background: #fff; }
  .field-hint { font-size: 11px; color: var(--muted); }

  .geo-group { display: none; }
  .geo-group.active { display: block; }

  .btn-run {
    width: 100%; padding: 11px; background: var(--primary); color: #fff;
    border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-run:hover:not(:disabled) { background: var(--primary-h); }
  .btn-run:active:not(:disabled) { transform: scale(.98); }
  .btn-run:disabled { opacity: .55; cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
    border-radius: 8px; padding: 10px 12px; font-size: 12px; display: none;
  }

  /* ---- Results panel ---- */
  .results {
    padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
  }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 12px; color: var(--muted);
  }
  .empty-icon { font-size: 48px; opacity: .35; }
  .empty-state p { font-size: 14px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .stat-card .label { font-size: 11px; color: var(--muted); font-weight: 500;
                       text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-card .unit  { font-size: 12px; color: var(--muted); margin-left: 3px; }
  .stat-card.highlight .value { color: var(--primary); }
  .stat-card.ok .value { color: var(--success); }
  .stat-card.warn .value { color: var(--warn); }

  .plot-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow);
  }
  .plot-card img { width: 100%; border-radius: 6px; }

  .detail-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; flex-wrap: wrap; gap: 24px;
    box-shadow: var(--shadow);
  }
  .detail-item .dl { font-size: 11px; color: var(--muted); font-weight: 500; }
  .detail-item .dv { font-size: 13px; font-weight: 600; margin-top: 2px; }

  /* ---- Responsive ---- */
  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <h1>⚡ Электростатика — Метод моментов</h1>
    <span class="badge">M1</span>
  </header>

  <div class="main">

    <!-- =================== Sidebar =================== -->
    <aside class="sidebar">

      <!-- Geometry selector -->
      <div>
        <div class="section-title">Геометрия</div>
        <div class="geo-tabs">
          <button class="geo-tab active" data-geo="plates">Пластины</button>
          <button class="geo-tab"        data-geo="spheres">Сферы</button>
        </div>
      </div>

      <!-- Plates params -->
      <div class="geo-group active" id="group-plates">
        <div class="section-title">Параметры пластин</div>

        <div class="field">
          <label>L — сторона пластины, м</label>
          <div class="field-row">
            <input type="range" id="r-L" min="0.1" max="5" step="0.05" value="1.0">
            <input type="number" class="num" id="n-L" value="1.0" min="0.1" max="5" step="0.05">
          </div>
        </div>

        <div class="field">
          <label>d — расстояние между пластинами, м</label>
          <div class="field-row">
            <input type="range" id="r-d" min="0.02" max="1.5" step="0.01" value="0.2">
            <input type="number" class="num" id="n-d" value="0.2" min="0.02" max="1.5" step="0.01">
          </div>
        </div>

        <div class="field">
          <label>nx — панелей по x</label>
          <div class="field-row">
            <input type="range" id="r-nx" min="2" max="25" step="1" value="12">
            <input type="number" class="num" id="n-nx" value="12" min="2" max="25" step="1">
          </div>
          <span class="field-hint">ny = nx (квадратная сетка)</span>
        </div>

        <div class="field">
          <label>V — разность потенциалов, В</label>
          <div class="field-row">
            <input type="range" id="r-V-p" min="0.1" max="10" step="0.1" value="1.0">
            <input type="number" class="num" id="n-V-p" value="1.0" min="0.1" max="10" step="0.1">
          </div>
        </div>
      </div>

      <!-- Spheres params -->
      <div class="geo-group" id="group-spheres">
        <div class="section-title">Параметры сфер</div>

        <div class="field">
          <label>R₁ — радиус внутренней сферы, м</label>
          <div class="field-row">
            <input type="range" id="r-R1" min="0.05" max="2" step="0.05" value="0.3">
            <input type="number" class="num" id="n-R1" value="0.3" min="0.05" max="2" step="0.05">
          </div>
        </div>

        <div class="field">
          <label>R₂ — радиус внешней сферы, м</label>
          <div class="field-row">
            <input type="range" id="r-R2" min="0.1" max="4" step="0.05" value="0.6">
            <input type="number" class="num" id="n-R2" value="0.6" min="0.1" max="4" step="0.05">
          </div>
        </div>

        <div class="field">
          <label>n_θ — широтных полос</label>
          <div class="field-row">
            <input type="range" id="r-nt" min="4" max="28" step="2" value="16">
            <input type="number" class="num" id="n-nt" value="16" min="4" max="28" step="2">
          </div>
          <span class="field-hint">n_φ = 2·n_θ автоматически</span>
        </div>

        <div class="field">
          <label>V — разность потенциалов, В</label>
          <div class="field-row">
            <input type="range" id="r-V-s" min="0.1" max="10" step="0.1" value="1.0">
            <input type="number" class="num" id="n-V-s" value="1.0" min="0.1" max="10" step="0.1">
          </div>
        </div>
      </div>

      <!-- Run button -->
      <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
        <div class="error-box" id="err-box"></div>
        <button class="btn-run" id="btn-run">
          <div class="spinner" id="spinner"></div>
          <span id="btn-label">Вычислить</span>
        </button>
      </div>

    </aside>

    <!-- =================== Results =================== -->
    <section class="results" id="results-panel">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">⚡</div>
        <p>Задайте параметры и нажмите <strong>Вычислить</strong></p>
      </div>
    </section>

  </div>
</div>

<script>
// ---- State ----
let currentGeo = 'plates';

// ---- Geo tabs ----
document.querySelectorAll('.geo-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentGeo = tab.dataset.geo;
    document.querySelectorAll('.geo-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.geo-group').forEach(g => g.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('group-' + currentGeo).classList.add('active');
    clearError();
  });
});

// ---- Sync range <-> number inputs ----
function syncPair(rangeId, numId) {
  const r = document.getElementById(rangeId);
  const n = document.getElementById(numId);
  r.addEventListener('input', () => { n.value = r.value; });
  n.addEventListener('input', () => { r.value = n.value; });
}
syncPair('r-L',   'n-L');
syncPair('r-d',   'n-d');
syncPair('r-nx',  'n-nx');
syncPair('r-V-p', 'n-V-p');
syncPair('r-R1',  'n-R1');
syncPair('r-R2',  'n-R2');
syncPair('r-nt',  'n-nt');
syncPair('r-V-s', 'n-V-s');

// ---- Collect params ----
function getParams() {
  if (currentGeo === 'plates') {
    const nx = parseInt(document.getElementById('n-nx').value);
    return {
      geometry: 'plates',
      L:  parseFloat(document.getElementById('n-L').value),
      d:  parseFloat(document.getElementById('n-d').value),
      nx: nx, ny: nx,
      V:  parseFloat(document.getElementById('n-V-p').value),
    };
  } else {
    const nt = parseInt(document.getElementById('n-nt').value);
    return {
      geometry: 'spheres',
      R_inner:  parseFloat(document.getElementById('n-R1').value),
      R_outer:  parseFloat(document.getElementById('n-R2').value),
      n_theta:  nt,
      n_phi:    nt * 2,
      V:        parseFloat(document.getElementById('n-V-s').value),
    };
  }
}

// ---- UI helpers ----
function setLoading(on) {
  const btn = document.getElementById('btn-run');
  const sp  = document.getElementById('spinner');
  const lbl = document.getElementById('btn-label');
  btn.disabled = on;
  sp.style.display  = on ? 'block' : 'none';
  lbl.textContent   = on ? 'Вычисляю…' : 'Вычислить';
}
function showError(msg) {
  const box = document.getElementById('err-box');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
function clearError() {
  document.getElementById('err-box').style.display = 'none';
}

// ---- Run ----
document.getElementById('btn-run').addEventListener('click', async () => {
  clearError();
  setLoading(true);

  const params = getParams();

  // Client-side sanity checks
  if (currentGeo === 'spheres' && params.R_outer <= params.R_inner) {
    showError('R₂ должен быть больше R₁');
    setLoading(false); return;
  }

  try {
    const resp = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
    });
    const data = await resp.json();

    if (!resp.ok || data.error) {
      showError(data.error || 'Ошибка сервера');
    } else {
      renderResults(data, currentGeo);
    }
  } catch (e) {
    showError('Нет связи с сервером: ' + e.message);
  } finally {
    setLoading(false);
  }
});

// ---- Render results ----
function renderResults(d, geo) {
  const panel = document.getElementById('results-panel');

  const errPct = geo === 'plates'
    ? ((d.C_ratio - 1) * 100).toFixed(1) + '% выше C∞'
    : d.rel_err.toFixed(2) + '%';

  const errClass = geo === 'plates'
    ? 'warn'
    : (d.rel_err < 2 ? 'ok' : 'warn');

  const analyticalLabel = geo === 'plates' ? 'C∞ (б/к краёв)' : 'C аналитич.';

  const panelCount = `${d.N_panels} панелей`;

  panel.innerHTML = `
    <!-- Stats cards -->
    <div class="stats">
      <div class="stat-card highlight">
        <div class="label">C (МоМ)</div>
        <div class="value">${d.C_mom.toFixed(2)}<span class="unit">пФ</span></div>
      </div>
      <div class="stat-card">
        <div class="label">${analyticalLabel}</div>
        <div class="value">${d.C_analytical.toFixed(2)}<span class="unit">пФ</span></div>
      </div>
      <div class="stat-card ${errClass}">
        <div class="label">${geo === 'plates' ? 'Краевой эффект' : 'Погрешность'}</div>
        <div class="value">${errPct}</div>
      </div>
    </div>

    <!-- Plot -->
    <div class="plot-card">
      <img src="data:image/png;base64,${d.plot}" alt="График поля">
    </div>

    <!-- Detail row -->
    <div class="detail-row">
      <div class="detail-item">
        <div class="dl">Дискретизация</div>
        <div class="dv">${panelCount}</div>
      </div>
      <div class="detail-item">
        <div class="dl">Q₊ (электрод +)</div>
        <div class="dv">${d.Q_pos.toFixed(4)} пКл</div>
      </div>
      <div class="detail-item">
        <div class="dl">Q₋ (электрод −)</div>
        <div class="dv">${d.Q_neg.toFixed(4)} пКл</div>
      </div>
      <div class="detail-item">
        <div class="dl">Q₊ + Q₋ (нейтральность)</div>
        <div class="dv">${d.Q_total.toFixed(3)} фКл</div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
